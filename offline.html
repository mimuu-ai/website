<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#faf8f5" />
  <title>Mimuu — Sem conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #faf8f5;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .container {
      max-width: 360px;
    }
    .emoji {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a2e;
    }
    p {
      font-size: 16px;
      color: #6b6b7b;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: linear-gradient(135deg, #ff8f00, #ffc928);
      color: #1a1a2e;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(255, 143, 0, 0.3);
      transition: transform 0.15s;
    }
    button:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>Sem conexão</h1>
    <p>Parece que a internet caiu. Quando voltar, é só recarregar que eu tô aqui! 💛</p>
    <button onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>
