<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#faf8f5" />
  <title>Projetos — Mimuu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./chat.css" />
  <link rel="icon" href="./favicon.ico" />
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <style>
    /* Reuse sidebar styles from chat (inline here for page isolation) */
    .app-layout { display: flex; height: 100vh; height: 100dvh; }

    .sidebar {
      width: 260px; background: #1a1a2e; color: #e8e4df;
      display: flex; flex-direction: column; flex-shrink: 0;
      overflow: hidden; transition: width .2s cubic-bezier(.4,0,.2,1);
    }
    .sidebar.collapsed { width: 0; }
    .sidebar-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 16px; color: #fff; text-decoration: none; }
    .sidebar-brand img { width: 24px; height: 24px; border-radius: 6px; }
    .sidebar-toggle { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; border-radius: 6px; background: transparent; color: #8a8680; cursor: pointer; }
    .sidebar-toggle:hover { background: rgba(255,255,255,.08); color: #fff; }
    .sidebar-nav { padding: 4px 10px; display: flex; flex-direction: column; gap: 1px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 14px; color: #c5c0ba; text-decoration: none; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: inherit; transition: background .12s, color .12s; }
    .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,.1); color: #fff; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,.06); margin: 8px 16px; }
    .sidebar-section { padding: 8px 16px 4px; font-size: 11px; font-weight: 500; color: #6b6860; text-transform: uppercase; letter-spacing: .05em; }
    .sidebar-list { flex: 1; overflow-y: auto; padding: 0 10px; }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
    .project-sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; font-size: 13px; color: #a8a29e; text-decoration: none; cursor: pointer; transition: background .12s, color .12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-sidebar-item:hover { background: rgba(255,255,255,.06); color: #e8e4df; }
    .project-sidebar-item.active { background: rgba(255,255,255,.1); color: #fff; }
    .project-sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .5; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; gap: 10px; }
    .sidebar-footer .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--brand), var(--brand-deep)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .sidebar-footer .user-name { font-size: 13px; font-weight: 500; color: #e8e4df; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-footer .user-plan { font-size: 11px; color: #6b6860; }

    /* Main content */
    .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

    /* List view */
    #listView { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

    .list-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; justify-content: space-between;
    }
    .list-header h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .new-btn {
      padding: 8px 16px; border: none; border-radius: 8px;
      background: var(--text); color: #fff; font: inherit; font-size: 13px;
      font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .new-btn:hover { opacity: .88; }

    .projects-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .project-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px; cursor: pointer;
      transition: all .15s var(--ease); position: relative;
    }
    .project-card:hover { border-color: var(--brand); box-shadow: var(--shadow-sm); }
    .project-card h3 { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
    .project-card p { margin: 0; color: var(--text-tertiary); font-size: 13px; line-height: 1.4; }
    .project-card .meta { margin-top: 10px; font-size: 11px; color: var(--text-placeholder); }
    .project-card .del-btn {
      position: absolute; top: 10px; right: 10px; width: 24px; height: 24px;
      border: none; border-radius: 6px; background: transparent;
      color: var(--text-placeholder); cursor: pointer; font-size: 14px;
      opacity: 0; transition: opacity .15s; display: flex; align-items: center; justify-content: center;
    }
    .project-card:hover .del-btn { opacity: .5; }
    .project-card .del-btn:hover { opacity: 1; color: #c4421a; background: rgba(196,66,26,.06); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-placeholder); }
    .empty-state h3 { color: var(--text); font-size: 16px; margin-bottom: 6px; }

    /* Workspace view */
    .workspace { display: none; flex: 1; overflow: hidden; min-height: 0; }
    .workspace.active { display: flex; }
    .ws-chat { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; }
    .ws-chat-toolbar {
      padding: 8px 12px; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      overflow-x: auto; white-space: nowrap;
    }
    .ws-back {
      background: none; border: none; color: var(--text-tertiary);
      cursor: pointer; font: inherit; font-size: 13px; padding: 4px 8px;
      border-radius: 6px; display: flex; align-items: center; gap: 4px;
    }
    .ws-back:hover { background: var(--surface-hover); color: var(--text); }
    .ws-title { font-weight: 600; font-size: 15px; flex: 1; }
    .ws-tool-btn {
      background: none; border: 1px solid var(--border); color: var(--text-tertiary);
      cursor: pointer; font: inherit; font-size: 12px; padding: 4px 10px;
      border-radius: 6px; display: flex; align-items: center; gap: 4px;
    }
    .ws-tool-btn:hover { border-color: var(--brand); color: var(--brand); }

    .ws-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
    .ws-composer {
      padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border-light); display: flex; gap: 8px;
      flex-shrink: 0; background: var(--bg); z-index: 5;
    }
    .ws-composer textarea {
      flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      font: inherit; font-size: 14px; resize: none; outline: none; max-height: 120px;
      background: var(--surface); color: var(--text);
    }
    .ws-composer textarea:focus { border-color: var(--brand); }
    .ws-composer .ws-send {
      width: 38px; height: 38px; border: none; border-radius: 50%;
      background: var(--text); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: flex-end;
    }

    /* Preview panel */
    .ws-preview { flex: 1; display: flex; flex-direction: column; background: var(--surface-hover); min-width: 0; border-left: 1px solid var(--border-light); }
    .ws-preview-header { padding: 8px 12px; font-size: 12px; font-weight: 500; color: var(--text-tertiary); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .ws-preview iframe { flex: 1; border: none; background: #fff; }
    .ws-no-preview { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-placeholder); font-size: 14px; padding: 40px; text-align: center; line-height: 1.6; }

    /* Messages in workspace */
    .ws-msg { max-width: 600px; font-size: 14px; line-height: 1.6; word-break: break-word; animation: msgIn .2s var(--ease); }
    .ws-msg.user { align-self: flex-end; max-width: 85%; text-align: right; }
    .ws-msg.user > span { display: inline-block; background: var(--text); color: #fff9ea; padding: 8px 14px; border-radius: 14px; border-bottom-right-radius: 4px; text-align: left; }
    .ws-msg.ai { padding: 0; }
    .ws-msg.ai p { margin: 0 0 8px; }
    .ws-msg.ai p:last-child { margin: 0; }
    .ws-msg.ai code { font-family: var(--mono); font-size: 13px; background: var(--bg-warm); padding: 2px 5px; border-radius: 4px; }
    .ws-msg.ai pre { background: #3d2b1f; color: #f5e6d3; padding: 12px; border-radius: var(--radius-sm); overflow: hidden; font-size: 12px; max-height: 80px; position: relative; cursor: pointer; transition: max-height .3s ease; border: 1px solid #5a3d2b; }
    .ws-msg.ai pre.expanded { max-height: none; overflow: auto; }
    .ws-msg.ai pre::after { content: '▼ Ver código'; display: block; position: absolute; bottom: 0; left: 0; right: 0; padding: 6px; background: linear-gradient(transparent, #3d2b1f 60%); color: #ffc928; font-size: 11px; text-align: center; pointer-events: none; }
    .ws-msg.ai pre.expanded::after { display: none; }
    .ws-msg.ai pre code { background: none; padding: 0; color: inherit; }
    .ws-msg { overflow: hidden; flex-shrink: 0; }

    .thinking-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: linear-gradient(145deg, var(--brand), var(--brand-deep));
      box-shadow: 0 2px 8px rgba(255,143,0,.3);
      animation: bounce 1s ease infinite;
      display: inline-block;
    }

    /* File panel (slides from right of chat) */
    .file-drawer { width: 0; overflow: hidden; border-left: 1px solid var(--border-light); background: var(--surface); transition: width .2s var(--ease); flex-shrink: 0; }
    .file-drawer.open { width: 200px; }
    .file-drawer-inner { width: 200px; height: 100%; display: flex; flex-direction: column; }
    .file-drawer-header { padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--text-tertiary); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .file-drawer-header button { background: none; border: none; cursor: pointer; color: var(--text-placeholder); font-size: 14px; }
    .file-drawer-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .fd-item { padding: 6px 12px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px; color: var(--text-secondary); transition: background .12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fd-item:hover { background: var(--surface-hover); }
    .fd-item.artifact { color: var(--brand); font-weight: 500; }

    /* Modals */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-bg.active { display: flex; }
    .modal-box { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 420px; box-shadow: 0 24px 60px rgba(0,0,0,.2); }
    .modal-box.wide { max-width: 600px; }
    .modal-box h2 { margin: 0 0 14px; font-size: 18px; }
    .modal-box input, .modal-box textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font: inherit; font-size: 14px; margin-bottom: 10px; outline: none; box-sizing: border-box; }
    .modal-box input:focus, .modal-box textarea:focus { border-color: var(--brand); }
    .modal-box textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .modal-actions button { padding: 8px 16px; border: none; border-radius: 8px; font: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-fill { background: var(--text); color: #fff; }
    .btn-fill:hover { opacity: .88; }
    .btn-flat { background: transparent; color: var(--text-tertiary); }
    .btn-flat:hover { background: var(--surface-hover); }

    /* File viewer code editor */
    .code-editor { width: 100%; min-height: 250px; max-height: 55vh; font-family: var(--mono); font-size: 13px; line-height: 1.5; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #1a1a2e; color: #fff3cc; resize: vertical; outline: none; box-sizing: border-box; }

    /* Mobile sidebar */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50; }
    .sidebar-overlay.vis { display: block; }
    .menu-btn { display: none; width: 34px; height: 34px; align-items: center; justify-content: center; border: none; border-radius: 6px; background: transparent; color: var(--text-tertiary); cursor: pointer; }
    .menu-btn:hover { background: var(--surface-hover); color: var(--text-secondary); }
    .sidebar.collapsed ~ .main-content .menu-btn { display: flex; }

    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 60; transform: translateX(-100%); transition: transform .25s var(--ease); }
      .sidebar.open { transform: translateX(0); }
      .menu-btn { display: flex; }
      .workspace { flex-direction: column; }
      .ws-preview { border-left: none; border-top: 1px solid var(--border-light); min-height: 250px; }
      .file-drawer.open { width: 160px; }
      .file-drawer-inner { width: 160px; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/" class="sidebar-brand"><img src="/mimuu-avatar.png" alt="Mimuu" /><span>Mimuu</span></a>
        <button class="sidebar-toggle" id="sidebarClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="/chat" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat
        </a>
        <button class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Projetos
        </button>
      </nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Projetos</div>
      <div id="sidebarProjects" class="sidebar-list"></div>
      <div class="sidebar-footer">
        <div class="avatar" id="userAvatar">?</div>
        <div style="flex:1;min-width:0">
          <div class="user-name" id="userName">—</div>
          <div class="user-plan">Mimuu Beta</div>
        </div>
        <button class="sidebar-toggle" id="logoutSidebar" title="Sair">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main content area -->
    <div class="main-content">

      <!-- List view -->
      <div id="listView">
        <div class="list-header">
          <div style="display:flex;align-items:center;gap:8px">
            <button class="menu-btn" id="menuBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1>Projetos</h1>
          </div>
          <button class="new-btn" id="newProjectBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo
          </button>
        </div>
        <div class="projects-scroll">
          <div id="projectsGrid" class="projects-grid"></div>
        </div>
      </div>

      <!-- Workspace view -->
      <div id="workspaceView" class="workspace">
        <!-- File drawer -->
        <div class="file-drawer" id="fileDrawer">
          <div class="file-drawer-inner">
            <div class="file-drawer-header"><span>Arquivos</span><button id="closeFiles">✕</button></div>
            <div class="file-drawer-list" id="fileList"></div>
          </div>
        </div>
        <!-- Chat -->
        <div class="ws-chat">
          <div class="ws-chat-toolbar">
            <button class="ws-back" id="backBtn">← Voltar</button>
            <span class="ws-title" id="wsTitle"></span>
            <button class="ws-tool-btn" id="filesBtn" title="Arquivos do projeto">📁</button>
            <button class="ws-tool-btn" id="contextBtn" title="Editar contexto">⚙️</button>
          </div>
          <div class="ws-messages" id="wsMessages"></div>
          <div class="ws-composer">
            <textarea id="wsInput" rows="1" placeholder="Descreva o que quer criar..."></textarea>
            <button class="ws-send" id="wsSend">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z"/></svg>
            </button>
          </div>
        </div>
        <!-- Preview -->
        <div class="ws-preview">
          <div class="ws-preview-header"><span id="previewTitle">Preview</span><button class="ws-tool-btn" id="refreshPreview" style="padding:2px 8px">🔄</button></div>
          <div id="noPreview" class="ws-no-preview">Peça ao Mimuu para criar algo!<br>Ex: "Cria um landing page para uma cafeteria"</div>
          <iframe id="previewFrame" style="display:none" sandbox="allow-scripts"></iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Modal -->
  <div class="modal-bg" id="createModal">
    <div class="modal-box">
      <h2>Novo Projeto</h2>
      <input type="text" id="projectName" placeholder="Nome do projeto" maxlength="80" />
      <textarea id="projectDesc" placeholder="Descrição (opcional)"></textarea>
      <div class="modal-actions">
        <button class="btn-flat" id="cancelCreate">Cancelar</button>
        <button class="btn-fill" id="confirmCreate">Criar</button>
      </div>
    </div>
  </div>

  <!-- Context Modal -->
  <div class="modal-bg" id="contextModal">
    <div class="modal-box wide">
      <h2>Contexto do Projeto</h2>
      <p style="font-size:13px;color:var(--text-tertiary);margin:0 0 10px">O Mimuu lê isso antes de cada resposta.</p>
      <textarea id="contextEditor" style="min-height:180px" placeholder="Stack, preferências, regras..."></textarea>
      <div class="modal-actions">
        <button class="btn-flat" id="cancelContext">Cancelar</button>
        <button class="btn-fill" id="saveContext">Salvar</button>
      </div>
    </div>
  </div>

  <!-- File Viewer Modal -->
  <div class="modal-bg" id="fileModal">
    <div class="modal-box wide">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <h2 style="margin:0" id="fileViewerName">arquivo</h2>
        <button class="btn-flat" id="closeFileViewer" style="padding:4px 8px">✕</button>
      </div>
      <textarea class="code-editor" id="fileViewerContent" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button class="btn-fill" id="fileSaveBtn" style="display:none">Salvar</button>
      </div>
    </div>
  </div>

  <script src="/projects.js"></script>
</body>
</html>
