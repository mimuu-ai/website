<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Mimuu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fff9ea;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 0;
    }

    .hero {
      background: linear-gradient(135deg, #ffc928 0%, #ffd54f 100%);
      padding: 2.5rem 1rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 40px;
      background: #fff9ea;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 4px solid #fff;
      box-shadow: 0 4px 20px rgba(255,143,0,0.3);
      margin-bottom: 1rem;
      object-fit: cover;
    }

    .hero h1 {
      font-family: 'Baloo 2', cursive;
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .hero p {
      color: #3d3d5c;
      font-size: 0.95rem;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .nome-field {
      margin-bottom: 1.5rem;
    }

    .nome-field input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #ffe0a0;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      background: #fff;
      color: #1a1a2e;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }

    .nome-field input:focus {
      border-color: #ff8f00;
      box-shadow: 0 0 0 3px rgba(255,143,0,0.15);
    }

    .nome-field input::placeholder { color: #b0a080; }

    .block {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 12px rgba(26,26,46,0.06);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .block-header {
      font-family: 'Baloo 2', cursive;
      font-size: 1.2rem;
      font-weight: 700;
      color: #ff8f00;
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #fff3d6;
    }

    .question {
      margin-bottom: 1.5rem;
    }

    .question:last-child { margin-bottom: 0; }

    .question label.q-label {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      color: #1a1a2e;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    /* Radio buttons */
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .radio-group label {
      position: relative;
      cursor: pointer;
    }

    .radio-group input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .radio-group .pill {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid #ffe0a0;
      border-radius: 25px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: #3d3d5c;
      background: #fffcf5;
      transition: all 0.25s ease;
      user-select: none;
    }

    .radio-group input[type="radio"]:checked + .pill {
      background: linear-gradient(135deg, #ffc928, #ffd54f);
      border-color: #ff8f00;
      color: #1a1a2e;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(255,143,0,0.2);
    }

    .radio-group .pill:hover {
      border-color: #ffb84d;
    }

    /* Checkboxes */
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .checkbox-group label {
      position: relative;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .checkbox-group .chip {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 2px solid #ffe0a0;
      border-radius: 25px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: #3d3d5c;
      background: #fffcf5;
      transition: all 0.25s ease;
      user-select: none;
    }

    .checkbox-group input[type="checkbox"]:checked + .chip {
      background: linear-gradient(135deg, #ffc928, #ffd54f);
      border-color: #ff8f00;
      color: #1a1a2e;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(255,143,0,0.2);
    }

    .checkbox-group .chip:hover {
      border-color: #ffb84d;
    }

    /* Star rating */
    .star-rating {
      display: flex;
      gap: 0.35rem;
      direction: rtl;
      justify-content: flex-end;
    }

    .star-rating input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .star-rating label {
      cursor: pointer;
      font-size: 2rem;
      color: #e0d6c0;
      transition: color 0.15s, transform 0.15s;
      line-height: 1;
    }

    .star-rating label:hover,
    .star-rating label:hover ~ label,
    .star-rating input:checked ~ label {
      color: #ff8f00;
    }

    .star-rating label:hover {
      transform: scale(1.15);
    }

    /* Textarea */
    .question textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #ffe0a0;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: #1a1a2e;
      background: #fffcf5;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .question textarea:focus {
      border-color: #ff8f00;
      box-shadow: 0 0 0 3px rgba(255,143,0,0.15);
    }

    .question textarea::placeholder { color: #b0a080; }

    /* Conditional field */
    .conditional {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease;
      opacity: 0;
      margin-bottom: 0;
    }

    .conditional.show {
      max-height: 200px;
      opacity: 1;
      margin-bottom: 1.5rem;
    }

    /* Submit button */
    .submit-wrap {
      text-align: center;
      margin-top: 0.5rem;
    }

    .submit-btn {
      display: inline-block;
      padding: 1rem 3rem;
      background: linear-gradient(135deg, #ffc928 0%, #ffd54f 100%);
      border: none;
      border-radius: 30px;
      font-family: 'Baloo 2', cursive;
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,143,0,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255,143,0,0.35);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .submit-btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(26,26,46,0.2);
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .submit-btn.loading .spinner { display: inline-block; }
    .submit-btn.loading .btn-text { opacity: 0.7; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Thank you screen */
    .thank-you {
      display: none;
      text-align: center;
      padding: 3rem 1.5rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .thank-you.show { display: block; }

    .thank-you .avatar {
      width: 100px;
      height: 100px;
      margin-bottom: 1.5rem;
    }

    .thank-you h2 {
      font-family: 'Baloo 2', cursive;
      font-size: 1.75rem;
      color: #ff8f00;
      margin-bottom: 0.75rem;
    }

    .thank-you p {
      color: #3d3d5c;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .form-wrap { display: block; }
    .form-wrap.hidden { display: none; }

    /* Error toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #ff4444;
      color: #fff;
      padding: 0.85rem 1.5rem;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: transform 0.4s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (min-width: 640px) {
      .hero { padding: 3rem 2rem 2.5rem; }
      .hero h1 { font-size: 2rem; }
      .container { padding: 2rem 1.5rem 4rem; }
      .block { padding: 2rem; }
      .avatar { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>

<div class="form-wrap" id="formWrap">
  <div class="hero">
    <img src="https://raw.githubusercontent.com/mimuu-ai/website/main/mimuu-avatar.jpg" alt="Mimuu" class="avatar" onerror="this.src='mimuu-avatar.jpg'">
    <h1>Conta pra gente!</h1>
    <p>Sua opiniao ajuda o Mimuu a ficar cada vez melhor. Leva menos de 3 minutos.</p>
  </div>

  <div class="container">
    <form id="feedbackForm" novalidate>

      <div class="nome-field">
        <input type="text" id="nome" name="nome" placeholder="Seu nome (opcional)">
      </div>

      <!-- BLOCO 1 — Perfil de Uso -->
      <div class="block" data-animate>
        <div class="block-header">Perfil de Uso</div>

        <div class="question">
          <label class="q-label">Com que frequencia voce usa o Mimuu?</label>
          <div class="radio-group">
            <label><input type="radio" name="frequencia" value="Todo dia"><span class="pill">Todo dia</span></label>
            <label><input type="radio" name="frequencia" value="Algumas vezes por semana"><span class="pill">Algumas vezes por semana</span></label>
            <label><input type="radio" name="frequencia" value="Raramente"><span class="pill">Raramente</span></label>
            <label><input type="radio" name="frequencia" value="Usei uma vez"><span class="pill">Usei uma vez</span></label>
          </div>
        </div>

        <div class="question">
          <label class="q-label">Pra que mais usa o Mimuu?</label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="usos" value="Tirar duvidas"><span class="chip">Tirar duvidas</span></label>
            <label><input type="checkbox" name="usos" value="Organizar tarefas"><span class="chip">Organizar tarefas</span></label>
            <label><input type="checkbox" name="usos" value="Escrever textos"><span class="chip">Escrever textos</span></label>
            <label><input type="checkbox" name="usos" value="Resumir coisas"><span class="chip">Resumir coisas</span></label>
            <label><input type="checkbox" name="usos" value="Pesquisas"><span class="chip">Pesquisas</span></label>
            <label><input type="checkbox" name="usos" value="Conversar/desabafar"><span class="chip">Conversar/desabafar</span></label>
            <label><input type="checkbox" name="usos" value="Outro"><span class="chip">Outro</span></label>
          </div>
        </div>

        <div class="question">
          <label class="q-label">Em que horario costuma usar mais?</label>
          <div class="radio-group">
            <label><input type="radio" name="horario" value="Manha"><span class="pill">Manha</span></label>
            <label><input type="radio" name="horario" value="Tarde"><span class="pill">Tarde</span></label>
            <label><input type="radio" name="horario" value="Noite"><span class="pill">Noite</span></label>
            <label><input type="radio" name="horario" value="Madrugada"><span class="pill">Madrugada</span></label>
          </div>
        </div>
      </div>

      <!-- BLOCO 2 — Qualidade das Respostas -->
      <div class="block" data-animate>
        <div class="block-header">Qualidade das Respostas</div>

        <div class="question">
          <label class="q-label">As respostas do Mimuu sao uteis?</label>
          <div class="star-rating">
            <input type="radio" name="respostas_uteis" value="5" id="ru5"><label for="ru5">&#9733;</label>
            <input type="radio" name="respostas_uteis" value="4" id="ru4"><label for="ru4">&#9733;</label>
            <input type="radio" name="respostas_uteis" value="3" id="ru3"><label for="ru3">&#9733;</label>
            <input type="radio" name="respostas_uteis" value="2" id="ru2"><label for="ru2">&#9733;</label>
            <input type="radio" name="respostas_uteis" value="1" id="ru1"><label for="ru1">&#9733;</label>
          </div>
        </div>

        <div class="question">
          <label class="q-label">O Mimuu entende bem o que voce pede?</label>
          <div class="star-rating">
            <input type="radio" name="entende_bem" value="5" id="eb5"><label for="eb5">&#9733;</label>
            <input type="radio" name="entende_bem" value="4" id="eb4"><label for="eb4">&#9733;</label>
            <input type="radio" name="entende_bem" value="3" id="eb3"><label for="eb3">&#9733;</label>
            <input type="radio" name="entende_bem" value="2" id="eb2"><label for="eb2">&#9733;</label>
            <input type="radio" name="entende_bem" value="1" id="eb1"><label for="eb1">&#9733;</label>
          </div>
        </div>

        <div class="question">
          <label class="q-label">As respostas sao rapidas o suficiente?</label>
          <div class="star-rating">
            <input type="radio" name="rapidez" value="5" id="rp5"><label for="rp5">&#9733;</label>
            <input type="radio" name="rapidez" value="4" id="rp4"><label for="rp4">&#9733;</label>
            <input type="radio" name="rapidez" value="3" id="rp3"><label for="rp3">&#9733;</label>
            <input type="radio" name="rapidez" value="2" id="rp2"><label for="rp2">&#9733;</label>
            <input type="radio" name="rapidez" value="1" id="rp1"><label for="rp1">&#9733;</label>
          </div>
        </div>

        <div class="question">
          <label class="q-label">O tom das conversas e agradavel?</label>
          <div class="star-rating">
            <input type="radio" name="tom_agradavel" value="5" id="ta5"><label for="ta5">&#9733;</label>
            <input type="radio" name="tom_agradavel" value="4" id="ta4"><label for="ta4">&#9733;</label>
            <input type="radio" name="tom_agradavel" value="3" id="ta3"><label for="ta3">&#9733;</label>
            <input type="radio" name="tom_agradavel" value="2" id="ta2"><label for="ta2">&#9733;</label>
            <input type="radio" name="tom_agradavel" value="1" id="ta1"><label for="ta1">&#9733;</label>
          </div>
        </div>

        <div class="question">
          <label class="q-label">O Mimuu ja errou em alguma resposta?</label>
          <div class="radio-group">
            <label><input type="radio" name="frequencia_erros" value="Nunca"><span class="pill">Nunca</span></label>
            <label><input type="radio" name="frequencia_erros" value="Poucas vezes"><span class="pill">Poucas vezes</span></label>
            <label><input type="radio" name="frequencia_erros" value="Com frequencia"><span class="pill">Com frequencia</span></label>
          </div>
        </div>
      </div>

      <!-- BLOCO 3 — Experiencia Geral -->
      <div class="block" data-animate>
        <div class="block-header">Experiencia Geral</div>

        <div class="question">
          <label class="q-label">O que mais gostou no Mimuu?</label>
          <textarea name="mais_gostou" placeholder="Conta o que te agradou..."></textarea>
        </div>

        <div class="question">
          <label class="q-label">O que te incomodou ou poderia melhorar?</label>
          <textarea name="melhorar" placeholder="Pode ser sincero, ajuda muito!"></textarea>
        </div>

        <div class="question">
          <label class="q-label">Sentiu falta de alguma funcionalidade?</label>
          <textarea name="falta_funcionalidade" placeholder="Algo que voce queria que o Mimuu fizesse..."></textarea>
        </div>

        <div class="question">
          <label class="q-label">Comparado a outros assistentes (ChatGPT, Siri, Google), como avalia o Mimuu?</label>
          <div class="radio-group">
            <label><input type="radio" name="comparacao" value="Muito melhor"><span class="pill">Muito melhor</span></label>
            <label><input type="radio" name="comparacao" value="Melhor"><span class="pill">Melhor</span></label>
            <label><input type="radio" name="comparacao" value="Parecido"><span class="pill">Parecido</span></label>
            <label><input type="radio" name="comparacao" value="Pior"><span class="pill">Pior</span></label>
            <label><input type="radio" name="comparacao" value="Nunca usei outros"><span class="pill">Nunca usei outros</span></label>
          </div>
        </div>
      </div>

      <!-- BLOCO 4 — Futuro -->
      <div class="block" data-animate>
        <div class="block-header">Futuro</div>

        <div class="question">
          <label class="q-label">Recomendaria o Mimuu pra alguem?</label>
          <div class="radio-group">
            <label><input type="radio" name="recomendaria" value="Com certeza"><span class="pill">Com certeza</span></label>
            <label><input type="radio" name="recomendaria" value="Provavelmente"><span class="pill">Provavelmente</span></label>
            <label><input type="radio" name="recomendaria" value="Talvez"><span class="pill">Talvez</span></label>
            <label><input type="radio" name="recomendaria" value="Nao"><span class="pill">Nao</span></label>
          </div>
        </div>

        <div class="question">
          <label class="q-label">Pagaria por um assistente como o Mimuu?</label>
          <div class="radio-group" id="pagariaGroup">
            <label><input type="radio" name="pagaria" value="Sim"><span class="pill">Sim</span></label>
            <label><input type="radio" name="pagaria" value="Depende do preco"><span class="pill">Depende do preco</span></label>
            <label><input type="radio" name="pagaria" value="Nao"><span class="pill">Nao</span></label>
          </div>
        </div>

        <div class="question conditional" id="quantoWrap">
          <label class="q-label">Se sim, quanto por mes acharia justo?</label>
          <div class="radio-group">
            <label><input type="radio" name="quanto_por_mes" value="Ate R$40"><span class="pill">Ate R$40</span></label>
            <label><input type="radio" name="quanto_por_mes" value="R$40-60"><span class="pill">R$40-60</span></label>
            <label><input type="radio" name="quanto_por_mes" value="R$60-80"><span class="pill">R$60-80</span></label>
            <label><input type="radio" name="quanto_por_mes" value="R$80-100"><span class="pill">R$80-100</span></label>
            <label><input type="radio" name="quanto_por_mes" value="Mais de R$100"><span class="pill">Mais de R$100</span></label>
          </div>
        </div>

        <div class="question">
          <label class="q-label">Algum comentario final?</label>
          <textarea name="comentario_final" placeholder="Fique a vontade! (opcional)"></textarea>
        </div>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Enviar feedback</span>
          <span class="spinner"></span>
        </button>
      </div>

    </form>
  </div>
</div>

<!-- Thank you screen -->
<div class="thank-you" id="thankYou">
  <div class="hero" style="margin-bottom: 2rem;">
    <img src="https://raw.githubusercontent.com/mimuu-ai/website/main/mimuu-avatar.jpg" alt="Mimuu" class="avatar" onerror="this.src='mimuu-avatar.jpg'">
    <h2>Muito obrigado!</h2>
    <p>Seu feedback vai ajudar o Mimuu a evoluir. A gente leva cada resposta a serio.</p>
  </div>
</div>

<!-- Error toast -->
<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://kyrybuwuxbvhzidxvlgd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5cnlidXd1eGJ2aHppZHh2bGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTc5MjMsImV4cCI6MjA4ODM5MzkyM30.kE5KhGhOlksr_4FfIVAqq_WU3VkKwCwmkLnWyW28cO8';

  // Scroll-based fade-in
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('[data-animate]').forEach(el => observer.observe(el));

  // Make nome-field visible immediately
  document.querySelector('.nome-field').style.opacity = 1;

  // Conditional: show "quanto por mes" if pagaria != "Nao"
  document.querySelectorAll('input[name="pagaria"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const val = document.querySelector('input[name="pagaria"]:checked')?.value;
      const wrap = document.getElementById('quantoWrap');
      if (val && val !== 'Nao') {
        wrap.classList.add('show');
      } else {
        wrap.classList.remove('show');
        // Clear selection
        document.querySelectorAll('input[name="quanto_por_mes"]').forEach(r => r.checked = false);
      }
    });
  });

  // Toast
  function showToast(msg, duration = 4000) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration);
  }

  // Form submission
  document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const form = e.target;

      // Collect checked checkboxes for "usos"
      const usos = Array.from(form.querySelectorAll('input[name="usos"]:checked')).map(c => c.value);

      // Collect star ratings (as integers)
      const getRadioVal = (name) => {
        const el = form.querySelector(`input[name="${name}"]:checked`);
        return el ? el.value : null;
      };
      const getRadioInt = (name) => {
        const v = getRadioVal(name);
        return v ? parseInt(v, 10) : null;
      };

      const payload = {
        nome: form.nome.value.trim() || null,
        frequencia: getRadioVal('frequencia'),
        usos: usos.length > 0 ? usos : null,
        horario: getRadioVal('horario'),
        respostas_uteis: getRadioInt('respostas_uteis'),
        entende_bem: getRadioInt('entende_bem'),
        rapidez: getRadioInt('rapidez'),
        tom_agradavel: getRadioInt('tom_agradavel'),
        frequencia_erros: getRadioVal('frequencia_erros'),
        mais_gostou: form.mais_gostou.value.trim() || null,
        melhorar: form.melhorar.value.trim() || null,
        falta_funcionalidade: form.falta_funcionalidade.value.trim() || null,
        comparacao: getRadioVal('comparacao'),
        recomendaria: getRadioVal('recomendaria'),
        pagaria: getRadioVal('pagaria'),
        quanto_por_mes: getRadioVal('quanto_por_mes'),
        comentario_final: form.comentario_final.value.trim() || null
      };

      // Remove null values
      Object.keys(payload).forEach(k => { if (payload[k] === null) delete payload[k]; });

      const res = await fetch(`${SUPABASE_URL}/rest/v1/feedback_responses`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Erro ${res.status}`);
      }

      // Show thank you
      document.getElementById('formWrap').classList.add('hidden');
      document.getElementById('thankYou').classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch (err) {
      console.error('Submit error:', err);
      showToast('Ops, algo deu errado. Tente novamente!');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
