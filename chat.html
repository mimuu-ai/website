<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#faf8f5" />
  <title>Mimuu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./chat.css" />
  <link rel="icon" href="./favicon.ico" />
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
</head>
<body>

  <!-- ─── LOGIN ─── -->
  <div id="loginView" class="login-view">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-glyph"></div>
      </div>
      <h1>Mimuu</h1>
      <p id="loginSub" class="login-sub">Entre com o email do seu Mimuu</p>
      <form id="loginForm" autocomplete="on">
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required />
        <input id="password" type="password" placeholder="Senha" autocomplete="current-password" style="display:none" />
        <button id="loginBtn" type="submit">Continuar</button>
      </form>
      <p id="loginStatus" class="login-status"></p>
      <a href="/" class="login-link">Ainda não tem um Mimuu?</a>
    </div>
  </div>

  <!-- ─── CHAT ─── -->
  <div id="chatView" class="chat-view" style="display:none">

    <!-- Top bar -->
    <header class="chat-topbar">
      <div class="topbar-left">
        <div class="avatar-dot"></div>
        <div class="topbar-info">
          <span id="title" class="topbar-name">Mimuu</span>
          <span id="health" class="topbar-status">conectando…</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="newChatBtn" class="icon-btn" title="Nova conversa">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <button id="logoutBtn" class="icon-btn" title="Sair">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages" class="messages"></div>

    <!-- Composer -->
    <div class="composer-wrap">
      <div class="composer">
        <div class="composer-row">
          <textarea id="input" placeholder="Mensagem" rows="1"></textarea>
          <button id="send" class="send-btn" title="Enviar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z"/></svg>
          </button>
        </div>
        <div class="composer-tools">
          <input id="fileInput" type="file" multiple accept="image/*,audio/*,.pdf,.txt,.md,.csv,.json,.doc,.docx" hidden />
          <button id="attachBtn" class="tool-btn" type="button" title="Anexar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button id="recBtn" class="tool-btn" type="button" title="Gravar áudio">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <span id="attachCount" class="attach-count"></span>
        </div>
      </div>
      <p class="composer-hint">Mimuu pode cometer erros. Verifique informações importantes.</p>
    </div>
  </div>

  <script type="module" src="./chat.js"></script>
</body>
</html>
