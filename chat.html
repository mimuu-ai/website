<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#faf8f5" />
  <title>Mimuu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./chat.css" />
  <link rel="icon" href="./favicon.ico" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <style>
    /* ═══ SIDEBAR ═══ */
    .app-layout {
      display: flex;
      height: 100vh;
      height: 100dvh;
    }

    .sidebar {
      width: 260px;
      background: #1a1a2e;
      color: #e8e4df;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width .2s var(--ease);
    }
    .sidebar.collapsed { width: 0; }

    .sidebar-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 16px;
      color: #fff;
      text-decoration: none;
    }
    .sidebar-brand img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }
    .sidebar-toggle {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border: none; border-radius: 6px; background: transparent;
      color: #8a8680; cursor: pointer; font-size: 14px;
    }
    .sidebar-toggle:hover { background: rgba(255,255,255,.08); color: #fff; }

    .sidebar-nav {
      padding: 4px 10px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      color: #c5c0ba;
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      transition: background .12s, color .12s;
    }
    .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,.1); color: #fff; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }

    .sidebar-divider {
      height: 1px;
      background: rgba(255,255,255,.06);
      margin: 8px 16px;
    }

    .sidebar-section {
      padding: 8px 16px 4px;
      font-size: 11px;
      font-weight: 500;
      color: #6b6860;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px;
    }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    .conv-item {
      display: block;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: #a8a29e;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .12s, color .12s;
    }
    .conv-item:hover { background: rgba(255,255,255,.06); color: #e8e4df; }

    .project-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: #a8a29e;
      text-decoration: none;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .project-item:hover { background: rgba(255,255,255,.06); color: #e8e4df; }
    .project-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .5; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-footer .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .sidebar-footer .user-info {
      flex: 1; min-width: 0;
    }
    .sidebar-footer .user-name {
      font-size: 13px; font-weight: 500; color: #e8e4df;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-footer .user-plan {
      font-size: 11px; color: #6b6860;
    }

    /* Chat area fills remaining space */
    .chat-view {
      flex: 1;
      min-width: 0;
    }

    /* Mobile sidebar */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 50;
    }
    .sidebar-overlay.active { display: block; }

    .menu-btn {
      width: 34px; height: 34px;
      display: none;
      align-items: center; justify-content: center;
      border: none; border-radius: 6px;
      background: transparent; color: var(--text-tertiary);
      cursor: pointer;
    }
    .menu-btn:hover { background: var(--surface-hover); color: var(--text-secondary); }

    /* Show menu button when sidebar is collapsed (desktop) or always on mobile */
    .sidebar.collapsed ~ .chat-view .menu-btn,
    .sidebar.collapsed ~ #chatView .menu-btn { display: flex; }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 60;
        transform: translateX(-100%);
        transition: transform .25s var(--ease);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-btn { display: flex; }
    }
  </style>
</head>
<body>

  <div class="app-layout">

    <!-- ─── SIDEBAR ─── -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/" class="sidebar-brand">
          <img src="/mimuu-avatar.png" alt="Mimuu" />
          <span>Mimuu</span>
        </a>
        <button class="sidebar-toggle" id="sidebarClose" title="Fechar menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item" id="newChatNav" title="Nova conversa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Novo bate-papo
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">Projetos</div>
      <div id="sidebarProjects" class="sidebar-list" style="max-height:180px;overflow-y:auto">
        <div style="padding:8px 10px;font-size:12px;color:#6b6860">Carregando...</div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">Recentes</div>
      <div id="sidebarRecents" class="sidebar-list">
        <div style="padding:8px 10px;font-size:12px;color:#6b6860">—</div>
      </div>

      <div class="sidebar-divider"></div>
      <div style="padding:4px 10px">
        <button id="googleConnectBtn" onclick="connectGoogle()" style="width:100%;padding:7px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#a8a29e;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;transition:all .15s">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span id="googleBtnText">Conectar Google</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">—</div>
          <div class="user-plan">Mimuu Beta</div>
        </div>
        <button class="sidebar-toggle" id="logoutBtn" title="Sair">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- ─── LOGIN ─── -->
    <div id="loginView" class="login-view" style="flex:1">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-glyph"><img src="/mimuu-avatar.png" alt="Mimuu" /></div>
        </div>
        <h1>Mimuu</h1>
        <p id="loginSub" class="login-sub">Entre com seu email ou nome</p>
        <form id="loginForm" autocomplete="on">
          <input id="email" type="text" placeholder="Email ou nome" autocomplete="email" required />
          <input id="password" type="password" placeholder="Senha" autocomplete="current-password" style="display:none" />
          <button id="loginBtn" type="submit">Continuar</button>
        </form>
        <input id="resetCode" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="Código de 6 dígitos" autocomplete="one-time-code" style="display:none" />
        <p id="loginStatus" class="login-status"></p>
        <div class="login-links">
          <a id="forgotLink" href="#" style="display:none">Esqueci a senha</a>
          <a href="/" class="login-link">Ainda não tem um Mimuu?</a>
        </div>
      </div>
    </div>

    <!-- ─── CHAT ─── -->
    <div id="chatView" class="chat-view" style="display:none">

      <header class="chat-topbar">
        <div class="topbar-left">
          <button class="menu-btn" id="menuBtn" title="Menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="avatar-dot"><img src="/mimuu-avatar.png" alt="Mimuu" /></div>
          <div class="topbar-info">
            <span id="title" class="topbar-name">Mimuu</span>
            <span id="health" class="topbar-status">conectando…</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="newChatBtn" class="icon-btn" title="Nova conversa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
        </div>
      </header>

      <div id="messages" class="messages"></div>

      <div class="composer-wrap">
        <div class="composer">
          <div class="composer-row">
            <textarea id="input" placeholder="Mensagem" rows="1"></textarea>
            <button id="send" class="send-btn" title="Enviar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z"/></svg>
            </button>
          </div>
          <div class="composer-tools">
            <input id="fileInput" type="file" multiple accept="image/*,audio/*,.pdf,.txt,.md,.csv,.json,.doc,.docx" hidden />
            <button id="attachBtn" class="tool-btn" type="button" title="Anexar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button id="recBtn" class="tool-btn" type="button" title="Gravar áudio">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <span id="attachCount" class="attach-count"></span>
          </div>
        </div>
        <p class="composer-hint">Mimuu pode cometer erros. Verifique informações importantes.</p>
      </div>
    </div>

  </div>

  <script type="module" src="./chat.js"></script>
</body>
</html>
