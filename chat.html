<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mimuu Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./shared.css" />
  <link rel="icon" href="./favicon.ico" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="brand" style="text-decoration:none;color:inherit"><span class="brand-dot"></span> Mimuu</a>
      <span class="badge" id="badge">CHAT</span>
    </div>
  </header>

  <!-- LOGIN -->
  <main id="loginView" class="container" style="display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 120px);">
    <section class="card panel" style="max-width:420px; width:100%; text-align:center;">
      <div style="font-size:42px; margin-bottom:8px;">🧡</div>
      <h2 style="margin:0 0 4px">Entrar no seu Mimuu</h2>
      <p id="loginSub" class="small" style="margin:0 0 20px">Use o email ou nome que cadastrou.</p>
      <form id="loginForm" class="form-row" autocomplete="on">
        <input id="email" type="text" placeholder="Email ou nome" autocomplete="email" />
        <input id="password" type="password" placeholder="Senha" autocomplete="current-password" style="display:none" />
        <input id="resetCode" type="text" placeholder="Código de 6 dígitos" maxlength="6" style="display:none" />
        <button id="loginBtn" type="submit" class="primary" style="width:100%">Continuar</button>
        <a href="#" id="forgotLink" style="display:none;font-size:12px;color:var(--brand);text-align:right">Esqueci a senha</a>
        <p id="loginStatus" class="small" style="min-height:18px"></p>
      </form>
      <p class="small" style="margin-top:16px">Ainda não tem um Mimuu? <a href="/" style="color:var(--brand)">Saiba mais</a></p>
    </section>
  </main>

  <!-- CHAT -->
  <main id="chatView" class="container" style="display:none;">
    <section class="card chat-shell">
      <div class="chat-head">
        <div class="chat-meta">
          <h2 id="title">Mimuu</h2>
          <span id="health" class="topbar-status">—</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <a href="/projects" style="color:var(--muted);text-decoration:none;font-size:12px">📂 Projetos</a>
          <button id="newChatBtn" class="ghost" style="padding:6px 10px; font-size:12px" title="Nova conversa">✨</button>
          <button id="logoutBtn" class="ghost" style="padding:6px 10px; font-size:12px">Sair</button>
        </div>
      </div>

      <div id="messages" class="msg-area"></div>

      <div class="composer">
        <div>
          <textarea id="input" placeholder="Escreve aqui... (Enter envia, Shift+Enter quebra linha)"></textarea>
          <div style="display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap;">
            <input id="fileInput" type="file" multiple accept="image/*,audio/*,.pdf,.txt,.md,.csv,.json,.doc,.docx" style="display:none" />
            <button id="attachBtn" class="ghost" type="button" style="padding:6px 10px; font-size:12px;">📎 Anexar</button>
            <button id="recBtn" class="ghost" type="button" style="padding:6px 10px; font-size:12px;">🎙️ Áudio</button>
            <span id="attachCount" class="small"></span>
          </div>
        </div>
        <button id="send" class="primary">Enviar</button>
      </div>
    </section>
  </main>

  <script type="module" src="./chat.js"></script>
</body>
</html>
